<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Bestie 🎉</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #fff;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 3em;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff; }
            to { text-shadow: 0 0 20px #ff4081; }
        }

        p {
            font-size: 1.5em;
        }

        button {
            padding: 15px 25px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            background: #ff4081;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e91e63;
        }

        .hidden-message {
            display: none;
            margin-top: 20px;
            font-size: 1.3em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎂 Happy Birthday, meri pyaari annu! 🎂</h1>
    <p>You make my life brighter every single day 💖</p>

    <button onclick="showMessage()">Click for a Surprise 🎁</button>

    <div class="hidden-message" id="message">
        <p>You're not just my best friend, you're my family ❤️</p>
        <p>Wishing you endless happiness, success, and love 🎉</p>
        <p>Let's make more crazy memories together
            i love you my bestie

            And sorry for my all stupid thinks! 😄</p>
    </div>
</div>

<script>
    function showMessage() {
        document.getElementById("message").style.display = "block";
    }
</script>

</body>
</html>
